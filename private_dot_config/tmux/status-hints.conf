# Second status line for keybinding hints (centered).
# Line 0 is left to rose-pine + agent-deck.
# Set at BOTH session and global level to override agent-deck's session-level `status on`.
set -g status 2
set status 2
set -g status-format[1] "\
#{?#{==:#{client_key_table},tab-mode},\
#[align=centre fg=cyan bold] TAB #[default] \
<h/l> prev/next <n> new <x> kill <r> rename <1-9> goto <Esc> quit\
,\
#{?#{==:#{client_key_table},pane-mode},\
#[align=centre fg=green bold] PANE #[default] \
<h/j/k/l> focus <n/r> split-h <d> split-v <x> kill <z> zoom <Esc> quit\
,\
#{?#{==:#{client_key_table},resize-mode},\
#[align=centre fg=magenta bold] RESIZE #[default] \
<h/j/k/l> +5 <H/J/K/L> +1 <Esc> quit\
,\
#{?#{m:*copy*,#{pane_mode}},\
#[align=centre fg=red bold] COPY #[default] \
<q> quit <Space> select </> search\
,\
#[align=centre fg=default dim]\
C-Space: <t> tab <p> pane <n> resize <s> scroll <f> float <w> worktree\
}\
}\
}\
}"

# Fallback status-right for line 0 (if agent-deck hasn't set a session override)
set -g status-right "#[fg=default dim]#{b:pane_current_path}"
