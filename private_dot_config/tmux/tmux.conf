# Main tmux config — used by all tmux sessions (agent-deck).
# Mirrors Zellij keybinds so muscle memory transfers.

# === Prefix: Ctrl+Space (matching Zellij) ===
set -g prefix C-Space
unbind C-b
bind C-Space send-prefix

# === Shell & Terminal ===
set -g default-shell /run/current-system/sw/bin/fish
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",xterm-ghostty:RGB"
set -g focus-events on
set -s escape-time 0

# === Behavior ===
set -g mouse on
set -s copy-command "pbcopy"
set -g set-clipboard on
set -g history-limit 10000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g pane-border-lines single
set -g pane-border-style "fg=default"
set -g pane-active-border-style "fg=default"

# === Splits (keep current path) ===
bind '"' split-window -v -c '#{pane_current_path}'
bind '%' split-window -h -c '#{pane_current_path}'

# === Pane focus (hjkl + arrows) ===
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind Left select-pane -L
bind Down select-pane -D
bind Up select-pane -U
bind Right select-pane -R

# === Window/tab management ===
bind c new-window -c '#{pane_current_path}'
bind , command-prompt -I "#W" "rename-window '%%'"
bind x kill-pane
bind z resize-pane -Z
bind d detach-client
bind o select-pane -t :.+
bind '[' copy-mode

# === Go to window by number ===
bind 1 select-window -t :=1
bind 2 select-window -t :=2
bind 3 select-window -t :=3
bind 4 select-window -t :=4
bind 5 select-window -t :=5
bind 6 select-window -t :=6
bind 7 select-window -t :=7
bind 8 select-window -t :=8
bind 9 select-window -t :=9

# === Sub-mode switchers ===
bind t switch-client -T tab-mode
bind p switch-client -T pane-mode
bind n switch-client -T resize-mode
bind s copy-mode
bind q confirm-before -p "kill session? (y/n)" kill-session
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded"
bind R send-keys -R \; clear-history \; display-message "Pane reset"

# === Tab-mode — STICKY (stays in mode until Esc/Enter) ===
bind -T tab-mode Escape switch-client -T root
bind -T tab-mode Enter switch-client -T root
bind -T tab-mode n new-window -c '#{pane_current_path}' \; switch-client -T tab-mode
bind -T tab-mode x confirm-before -p "kill window? (y/n)" kill-window
bind -T tab-mode r command-prompt -I "#W" "rename-window '%%'"
bind -T tab-mode h previous-window \; switch-client -T tab-mode
bind -T tab-mode l next-window \; switch-client -T tab-mode
bind -T tab-mode j next-window \; switch-client -T tab-mode
bind -T tab-mode k previous-window \; switch-client -T tab-mode
bind -T tab-mode 1 select-window -t :=1 \; switch-client -T tab-mode
bind -T tab-mode 2 select-window -t :=2 \; switch-client -T tab-mode
bind -T tab-mode 3 select-window -t :=3 \; switch-client -T tab-mode
bind -T tab-mode 4 select-window -t :=4 \; switch-client -T tab-mode
bind -T tab-mode 5 select-window -t :=5 \; switch-client -T tab-mode
bind -T tab-mode 6 select-window -t :=6 \; switch-client -T tab-mode
bind -T tab-mode 7 select-window -t :=7 \; switch-client -T tab-mode
bind -T tab-mode 8 select-window -t :=8 \; switch-client -T tab-mode
bind -T tab-mode 9 select-window -t :=9 \; switch-client -T tab-mode

# === Pane-mode — STICKY ===
bind -T pane-mode Escape switch-client -T root
bind -T pane-mode Enter switch-client -T root
bind -T pane-mode n split-window -h -c '#{pane_current_path}' \; switch-client -T pane-mode
bind -T pane-mode d split-window -v -c '#{pane_current_path}' \; switch-client -T pane-mode
bind -T pane-mode r split-window -h -c '#{pane_current_path}' \; switch-client -T pane-mode
bind -T pane-mode x kill-pane \; switch-client -T pane-mode
bind -T pane-mode z resize-pane -Z
bind -T pane-mode h select-pane -L \; switch-client -T pane-mode
bind -T pane-mode j select-pane -D \; switch-client -T pane-mode
bind -T pane-mode k select-pane -U \; switch-client -T pane-mode
bind -T pane-mode l select-pane -R \; switch-client -T pane-mode
bind -T pane-mode p select-pane -t :.+ \; switch-client -T pane-mode

# === Resize-mode — STICKY ===
bind -T resize-mode Escape switch-client -T root
bind -T resize-mode Enter switch-client -T root
bind -T resize-mode h resize-pane -L 5 \; switch-client -T resize-mode
bind -T resize-mode j resize-pane -D 5 \; switch-client -T resize-mode
bind -T resize-mode k resize-pane -U 5 \; switch-client -T resize-mode
bind -T resize-mode l resize-pane -R 5 \; switch-client -T resize-mode
bind -T resize-mode H resize-pane -L 1 \; switch-client -T resize-mode
bind -T resize-mode J resize-pane -D 1 \; switch-client -T resize-mode
bind -T resize-mode K resize-pane -U 1 \; switch-client -T resize-mode
bind -T resize-mode L resize-pane -R 1 \; switch-client -T resize-mode

# === Plugins (via TPM) ===
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'omerxx/tmux-floax'
set -g @plugin 'rose-pine/tmux'

# Rose Pine Dawn (matching Zellij theme)
set -g @rose_pine_variant 'dawn'

# Floax — floating panes (like Zellij's Cmd+f)
set -g @floax-bind 'f'
set -g @floax-bind-menu 'F'
set -g @floax-width '80%'
set -g @floax-height '80%'

# Resurrect + Continuum — session persistence
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# TPM init
run '~/.config/tmux/plugins/tpm/tpm'

# === Zellij-style hint bar on second status line ===
# Line 0: rose-pine theme + agent-deck info (status-left/right)
# Line 1: our keybinding hints (centered)
set -g @rose_pine_directory 'on'
# Guard: when any option changes, restore `status 2` if agent-deck reset it.
# Only sets the value (not the full hints file), so the re-trigger is a no-op.
set-hook -g after-set-option 'if-shell "[ \"$(tmux show -qv status 2>/dev/null)\" != 2 ]" "set status 2"'
set-hook -g after-new-session 'source-file ~/.config/tmux/status-hints.conf'
run -b 'sleep 0.5 && tmux source-file ~/.config/tmux/status-hints.conf'
